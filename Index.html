<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.5, user-scalable=yes">
    <title>نقاط الأعضاء</title>
    <style>
        /* reset */
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            background: #f4f7fb;
            font-family: 'Segoe UI', Tahoma, sans-serif;
            line-height: 1.5;
            padding: 15px;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        .container {
            max-width: 1600px;
            margin: 0 auto;
            width: 100%;
        }

        h1 {
            text-align: center;
            color: #1e3c5c;
            font-size: clamp(1.8rem, 6vw, 2.8rem);
            margin-bottom: 10px;
            font-weight: 700;
            word-break: break-word;
        }

        .subtitle {
            text-align: center;
            color: #2c3e50;
            font-size: clamp(1rem, 4vw, 1.3rem);
            margin: 0 auto 30px auto;
            background: #d0e2f2;
            padding: 10px 20px;
            border-radius: 40px;
            display: inline-block;
            width: auto;
            max-width: 90%;
        }

        /* شبكة الأعضاء */
        .members-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(min(100%, 380px), 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }

        .member-card {
            background: white;
            border-radius: 28px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.05);
            padding: 18px 15px;
            border: 1px solid #d9e2ef;
            transition: 0.2s;
            width: 100%;
            overflow: hidden;
        }

        .member-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 3px solid #3498db;
            padding-bottom: 12px;
            margin-bottom: 15px;
            gap: 10px;
            flex-wrap: wrap;
        }

        .member-name {
            font-size: clamp(1.1rem, 4vw, 1.3rem);
            font-weight: 700;
            color: #1e3c5c;
            word-break: break-word;
        }

        .member-total {
            background: #2c3e50;
            color: white;
            padding: 6px 16px;
            border-radius: 40px;
            font-weight: 600;
            font-size: clamp(1rem, 3.5vw, 1.1rem);
            white-space: nowrap;
        }

        .task-category {
            background: #eef3fa;
            border-radius: 20px;
            padding: 12px;
            margin-bottom: 15px;
        }

        .category-title {
            font-weight: 700;
            color: #1e5f8e;
            margin-bottom: 12px;
            font-size: clamp(1rem, 3.5vw, 1.1rem);
            border-right: 5px solid #3498db;
            padding-right: 10px;
        }

        .task-row {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 10px 5px;
            border-bottom: 1px dashed #cbd6e4;
            flex-wrap: wrap;
        }

        .task-row:last-child {
            border-bottom: none;
        }

        .task-row input[type="checkbox"] {
            width: 24px;
            height: 24px;
            min-width: 24px;
            accent-color: #27ae60;
            cursor: pointer;
        }

        .task-desc {
            flex: 1;
            font-size: clamp(0.85rem, 3vw, 0.95rem);
            color: #1e2f3e;
            word-break: break-word;
            min-width: 150px;
        }

        .task-points {
            background: #d4e3fd;
            padding: 4px 10px;
            border-radius: 30px;
            font-weight: 600;
            color: #0b3b5c;
            font-size: clamp(0.75rem, 2.5vw, 0.85rem);
            white-space: nowrap;
        }

        .design-input {
            display: flex;
            align-items: center;
            gap: 8px;
            margin-top: 8px;
            margin-right: 30px;
            flex-wrap: wrap;
        }

        .design-input label {
            font-size: 0.9rem;
            color: #2c3e50;
            min-width: 100px;
        }

        .design-input input {
            flex: 1;
            min-width: 150px;
            padding: 10px 14px;
            border: 1px solid #bdd3e8;
            border-radius: 30px;
            font-size: 0.95rem;
            background: #f9fcff;
        }

        /* أزرار التحكم */
        .btn-update {
            display: block;
            width: 100%;
            max-width: 350px;
            margin: 20px auto;
            background: #27ae60;
            color: white;
            border: none;
            padding: 16px 20px;
            border-radius: 60px;
            font-size: 1.3rem;
            font-weight: 600;
            cursor: pointer;
            border-bottom: 4px solid #1e8449;
            transition: 0.1s;
            text-align: center;
        }

        .btn-update:hover {
            background: #229954;
        }

        .summary-panel {
            background: white;
            border-radius: 30px;
            padding: 20px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
            margin-top: 30px;
            border: 1px solid #cfdeed;
        }

        .summary-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 15px;
            margin-bottom: 20px;
        }

        .summary-header h2 {
            margin: 0;
            color: #1e3c5c;
            font-size: clamp(1.5rem, 5vw, 2rem);
        }

        .btn-group {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
        }

        .btn {
            background: #3498db;
            border: none;
            color: white;
            padding: 12px 20px;
            border-radius: 40px;
            font-weight: 600;
            cursor: pointer;
            border-bottom: 3px solid #1f618d;
            transition: 0.1s;
            font-size: 1rem;
            min-width: 120px;
            text-align: center;
        }

        .btn-copy {
            background: #e67e22;
            border-bottom-color: #b45f1b;
        }

        .btn:hover {
            opacity: 0.9;
        }

        .summary-content {
            background: #edf3fa;
            border-radius: 24px;
            padding: 18px;
            max-height: 450px;
            overflow-y: auto;
            white-space: pre-wrap;
            font-family: 'Courier New', monospace;
            direction: ltr;
            text-align: left;
            border: 1px solid #bdd3e8;
            color: #1e2f3e;
            font-size: 0.9rem;
            line-height: 1.6;
        }

        /* تحسينات للشاشات الصغيرة */
        @media (max-width: 600px) {
            body {
                padding: 10px;
            }

            .member-card {
                padding: 15px 12px;
            }

            .task-row {
                gap: 6px;
            }

            .task-desc {
                min-width: 120px;
            }

            .design-input {
                margin-right: 15px;
            }

            .design-input label {
                min-width: 80px;
                font-size: 0.85rem;
            }

            .btn-group {
                flex-direction: column;
                width: 100%;
            }

            .btn {
                width: 100%;
            }

            .summary-header {
                flex-direction: column;
                align-items: stretch;
            }
        }

        /* للشاشات الصغيرة جداً */
        @media (max-width: 400px) {
            .task-row {
                flex-direction: column;
                align-items: flex-start;
            }

            .task-points {
                align-self: flex-start;
            }

            .design-input {
                margin-right: 0;
                width: 100%;
            }

            .member-header {
                flex-direction: column;
                align-items: flex-start;
            }

            .member-total {
                align-self: flex-start;
            }
        }
    </style>
</head>
<body>
<div class="container">
    <h1>🧾 نظام النقاط · الأدوار المتغيرة</h1>
    <div style="text-align: center;"><span class="subtitle">⚡ فرق المتابعة والتصميم والإدارة + نقاط تحفيزية</span></div>

    <div id="membersGrid" class="members-grid"></div>

    <button class="btn-update" id="updateTotalsBtn">🔄 تحديث المجاميع</button>

    <div class="summary-panel">
        <div class="summary-header">
            <h2>📋 الملخص التفصيلي</h2>
            <div class="btn-group">
                <button class="btn" id="summaryBtn">📄 عرض الملخص</button>
                <button class="btn btn-copy" id="copySummaryBtn">📋 نسخ التقرير</button>
            </div>
        </div>
        <div class="summary-content" id="summaryText" dir="rtl">سيظهر الملخص بعد الضغط على "عرض الملخص".</div>
    </div>
</div>

<script>
(function() {
    // --------------------- قائمة الأعضاء (الرسمية) -----------------------
    const memberNames = [
        "منتظر عبدالله عيسى البوعيسى",
        "علي حسن بن الشيخ",
        "حسين يوسف اللويم",
        "بشاير جواد عبدالعزيز النجار",
        "سراء محمد إسماعيل محمد",
        "شهد علي الجمعان",
        "حبيبه هاني عمر بدري",
        "منتظر حسين الجنبي",
        "عبدالمحسن علي الحاجي",
        "علي عبدالهادي العبدرب النبي"
    ];

    // ---------- هيكل المهام حسب الآلية ----------
    function createBaseTasks() {
        return [
            { desc: "🔍 تشييك أسبوعي (مرة واحدة) – 12 نقطة", points: 12, isDesign: false, category: "فرقة المتابعة" },
            { desc: "🔍 تشييك أسبوعي (مرتين) – 25 نقطة", points: 25, isDesign: false, category: "فرقة المتابعة" },
            { desc: "🖌️ عمل أسبوعي (تصميم/كود/واجهة) – 25 نقطة", points: 25, isDesign: true, category: "فرقة التصميم" },
            { desc: "🖼️ تصميم إضافي +5 (لكل تصميم)", points: 5, isDesign: true, category: "فرقة التصميم" },
            { desc: "🗂️ تنسيق وإدارة أسبوعي – 25 نقطة", points: 25, isDesign: false, category: "تنسيق وإدارة" },
            { desc: "💡 فكرة مفيدة – 5 نقاط", points: 5, isDesign: false, category: "أفكار" },
            { desc: "✨ فكرة مفيدة وتم تطبيقها – 10 نقاط", points: 10, isDesign: false, category: "أفكار" },
            { desc: "🤝 تطوع بتشييك (غير مسؤول) – +5 نقاط", points: 5, isDesign: false, category: "تطوع" },
            { desc: "🎨 تطوع بتصميم (غير مسؤول) – +10 نقاط", points: 10, isDesign: true, category: "تطوع" }
        ];
    }

    // دالة لإنشاء قائمة مخصصة لكل عضو (دمج القاعدة مع الإضافات الفردية)
    function getTasksForMember(memberFullName) {
        const base = createBaseTasks();
        const extra = [];

        switch (memberFullName) {
            case "علي حسن بن الشيخ":
                extra.push(
                    { desc: "فكرة الإشعارات/الإعلان بالواتس", points: 5, isDesign: false, category: "إنجازات سابقة" },
                    { desc: "الكلمات المفتاحية بالتعليقات", points: 5, isDesign: false, category: "إنجازات سابقة" },
                    { desc: "كاهوت/لعبة يومية", points: 5, isDesign: false, category: "إنجازات سابقة" },
                    { desc: "الستريك (مطبقة)", points: 10, isDesign: false, category: "إنجازات سابقة" },
                    { desc: "فوازير رمضان (مطبقة)", points: 10, isDesign: false, category: "إنجازات سابقة" },
                    { desc: "فكرة ربط الستريك مع السبونسر", points: 5, isDesign: false, category: "إنجازات سابقة" },
                    { desc: "فاز بفعالية الردهة", points: 10, isDesign: false, category: "إنجازات سابقة" }
                );
                break;
            case "حبيبه هاني عمر بدري":
                extra.push(
                    { desc: "فكرة إيموجي بأماكن مختلفة (مطبقة)", points: 10, isDesign: false, category: "إنجازات سابقة" },
                    { desc: "فكرة صفحة الخدمات", points: 5, isDesign: false, category: "إنجازات سابقة" },
                    { desc: "تصميم البطاقة الي تُلبَس", points: 5, isDesign: true, category: "إنجازات سابقة" },
                    { desc: "واجهة الختمة والفوازير", points: 10, isDesign: true, category: "إنجازات سابقة" },
                    { desc: "تصميم صفحة الخدمات", points: 5, isDesign: true, category: "إنجازات سابقة" }
                );
                break;
            case "بشاير جواد عبدالعزيز النجار":
                extra.push(
                    { desc: "فكرة مطبقة", points: 10, isDesign: false, category: "إنجازات سابقة" },
                    { desc: "تصميم البطاقة الي تُلبَس", points: 5, isDesign: true, category: "إنجازات سابقة" },
                    { desc: "٤ تصاميم للفعاليات السابقة", points: 20, isDesign: true, category: "إنجازات سابقة" }
                );
                break;
            case "منتظر حسين الجنبي":
                extra.push(
                    { desc: "الهيدر في المنصة (مطبقة)", points: 10, isDesign: false, category: "إنجازات سابقة" },
                    { desc: "صورة البروفايل في الهيدر (مطبقة)", points: 10, isDesign: false, category: "إنجازات سابقة" },
                    { desc: "صورة للصحيفة", points: 10, isDesign: true, category: "إنجازات سابقة" },
                    { desc: "واجهة جلسة حوارية", points: 10, isDesign: true, category: "إنجازات سابقة" },
                    { desc: "نقاط من المقابلة", points: 5, isDesign: false, category: "إنجازات سابقة" },
                    { desc: "عمل على الديسكورد", points: 20, isDesign: false, category: "إنجازات سابقة" }
                );
                break;
            case "حسين يوسف اللويم":
                extra.push(
                    { desc: "صفحة التحميل", points: 5, isDesign: false, category: "إنجازات سابقة" },
                    { desc: "صورة للصحيفة", points: 10, isDesign: true, category: "إنجازات سابقة" },
                    { desc: "واجهة ورشة التصميم", points: 10, isDesign: true, category: "إنجازات سابقة" },
                    { desc: "نقاط من المقابلة", points: 5, isDesign: false, category: "إنجازات سابقة" },
                    { desc: "عمل على الديسكورد", points: 20, isDesign: false, category: "إنجازات سابقة" }
                );
                break;
            case "شهد علي الجمعان":
                extra.push(
                    { desc: "صورة للصحيفة", points: 10, isDesign: true, category: "إنجازات سابقة" },
                    { desc: "تصميم لليالي كفو (تطوع)", points: 10, isDesign: true, category: "إنجازات سابقة" },
                    { desc: "فازت بمسابقة التصميم", points: 15, isDesign: false, category: "إنجازات سابقة" }
                );
                break;
            case "عبدالمحسن علي الحاجي":
                extra.push(
                    { desc: "الوضع الداكن بالمنصة", points: 5, isDesign: false, category: "إنجازات سابقة" }
                );
                break;
            case "منتظر عبدالله عيسى البوعيسى":
                extra.push(
                    { desc: "فكرة لتوزيع النقاط", points: 5, isDesign: false, category: "إنجازات سابقة" },
                    { desc: "تصميمين للفعاليات السابقة", points: 10, isDesign: true, category: "إنجازات سابقة" }
                );
                break;
            case "سراء محمد إسماعيل محمد":
                extra.push(
                    { desc: "المقطع في الصفحة الرئيسية", points: 5, isDesign: false, category: "إنجازات سابقة" },
                    { desc: "تصميم مختلف لصفحة الخدمات", points: 5, isDesign: true, category: "إنجازات سابقة" },
                    { desc: "فكرة للثيم الرمضاني (مطبقة)", points: 10, isDesign: false, category: "إنجازات سابقة" },
                    { desc: "فكرة مطبّقة لنظام النقاط", points: 10, isDesign: false, category: "إنجازات سابقة" },
                    { desc: "توزيع شي ثاني يخص النقاط (مطبقة)", points: 10, isDesign: false, category: "إنجازات سابقة" },
                    { desc: "مجهودات إضافية تشكر", points: 10, isDesign: false, category: "إنجازات سابقة" },
                    { desc: "مشاركة في فعالية التصميم", points: 5, isDesign: false, category: "إنجازات سابقة" }
                );
                break;
            // علي عبدالهادي العبدرب النبي لا توجد إضافات
        }

        return [...extra, ...base];
    }

    // --------------------- بناء الصفحة -----------------------
    const membersGrid = document.getElementById('membersGrid');
    let memberSections = [];

    function renderAll() {
        membersGrid.innerHTML = '';
        memberSections = [];

        memberNames.forEach((fullName, memberIdx) => {
            const tasks = getTasksForMember(fullName);
            const card = document.createElement('div');
            card.className = 'member-card';
            card.dataset.memberIndex = memberIdx;

            const header = document.createElement('div');
            header.className = 'member-header';
            header.innerHTML = `
                <span class="member-name">${fullName}</span>
                <span class="member-total" id="total-${memberIdx}">0</span>
            `;
            card.appendChild(header);

            const tasksContainer = document.createElement('div');
            tasksContainer.className = 'tasks-container';

            // تجميع المهام حسب الفئة
            const categories = {};
            tasks.forEach((task, idx) => {
                const cat = task.category || "أخرى";
                if (!categories[cat]) categories[cat] = [];
                categories[cat].push({ ...task, originalIdx: idx });
            });

            let taskCounter = 0;
            for (let cat in categories) {
                if (categories[cat].length === 0) continue;
                const catDiv = document.createElement('div');
                catDiv.className = 'task-category';
                catDiv.innerHTML = `<div class="category-title">${cat}</div>`;

                categories[cat].forEach(task => {
                    const taskRow = document.createElement('div');
                    taskRow.className = 'task-row';

                    const chk = document.createElement('input');
                    chk.type = 'checkbox';
                    chk.checked = true;
                    chk.dataset.member = memberIdx;
                    chk.dataset.task = taskCounter;
                    chk.dataset.points = task.points;

                    const descSpan = document.createElement('span');
                    descSpan.className = 'task-desc';
                    descSpan.textContent = task.desc;

                    const pointsSpan = document.createElement('span');
                    pointsSpan.className = 'task-points';
                    pointsSpan.textContent = `${task.points} نقطة`;

                    taskRow.appendChild(chk);
                    taskRow.appendChild(descSpan);
                    taskRow.appendChild(pointsSpan);
                    catDiv.appendChild(taskRow);

                    if (task.isDesign) {
                        const designDiv = document.createElement('div');
                        designDiv.className = 'design-input';
                        const label = document.createElement('label');
                        label.textContent = '🏷️ اسم التصميم:';
                        const input = document.createElement('input');
                        input.type = 'text';
                        input.placeholder = 'اختياري...';
                        input.dataset.member = memberIdx;
                        input.dataset.task = taskCounter;
                        designDiv.appendChild(label);
                        designDiv.appendChild(input);
                        catDiv.appendChild(designDiv);
                    }

                    if (!memberSections[memberIdx]) {
                        memberSections[memberIdx] = { checkboxes: [], designInputs: [] };
                    }
                    memberSections[memberIdx].checkboxes.push({ chk, taskIdx: taskCounter });

                    taskCounter++;
                });

                tasksContainer.appendChild(catDiv);
            }

            card.appendChild(tasksContainer);
            membersGrid.appendChild(card);
        });

        // جمع حقول التصميم بعد الإضافة
        memberNames.forEach((_, memberIdx) => {
            if (!memberSections[memberIdx]) memberSections[memberIdx] = { checkboxes: [], designInputs: [] };
            const designInputs = [];
            document.querySelectorAll(`.design-input input[data-member="${memberIdx}"]`).forEach(input => {
                const taskIdx = parseInt(input.dataset.task);
                designInputs.push({ input, taskIdx });
            });
            memberSections[memberIdx].designInputs = designInputs;
        });

        updateAllTotals();
    }

    function updateAllTotals() {
        memberSections.forEach((section, memberIdx) => {
            let total = 0;
            section.checkboxes.forEach(item => {
                if (item.chk.checked) {
                    total += parseInt(item.chk.dataset.points) || 0;
                }
            });
            const totalSpan = document.getElementById(`total-${memberIdx}`);
            if (totalSpan) totalSpan.textContent = total;
        });
    }

    function generateSummary() {
        let summary = '';
        let grandTotal = 0;

        memberNames.forEach((fullName, memberIdx) => {
            const section = memberSections[memberIdx];
            if (!section) return;
            let memberTotal = 0;
            let lines = [];

            section.checkboxes.forEach(item => {
                if (item.chk.checked) {
                    const taskIdx = item.taskIdx;
                    const points = parseInt(item.chk.dataset.points) || 0;
                    memberTotal += points;
                    const row = item.chk.closest('.task-row');
                    const descSpan = row?.querySelector('.task-desc');
                    const desc = descSpan ? descSpan.textContent : 'مهمة';
                    let designText = '';
                    const designObj = section.designInputs.find(d => d.taskIdx === taskIdx);
                    if (designObj && designObj.input.value.trim() !== '') {
                        designText = ` (التصميم: "${designObj.input.value}")`;
                    }
                    lines.push(`   ✅ ${desc} : ${points} نقطة${designText}`);
                }
            });

            if (lines.length > 0) {
                summary += `🔸 ${fullName}\n`;
                summary += lines.join('\n');
                summary += `\n   ➕ المجموع: ${memberTotal} نقطة\n\n`;
            } else {
                summary += `🔸 ${fullName}\n   ❌ لم يتم تحديد أي مهمة.\n\n`;
            }
            grandTotal += memberTotal;
        });

        summary += `🏁 الإجمالي العام: ${grandTotal} نقطة`;
        return summary;
    }

    function showSummary() {
        const summary = generateSummary();
        document.getElementById('summaryText').textContent = summary;
    }

    function copySummary() {
        const summary = generateSummary();
        const detailed = `📊 تقرير نقاط الأعضاء وفق آلية التوزيع:\n\n${summary}\n\n🗓️  التحديث: ${new Date().toLocaleString('ar-EG')}`;
        navigator.clipboard.writeText(detailed).then(() => {
            alert('✅ تم نسخ التقرير إلى الحافظة');
        }).catch(() => {
            alert('⚠️ تعذر النسخ، يمكنك النسخ يدويًا');
        });
    }

    window.addEventListener('DOMContentLoaded', () => {
        renderAll();

        document.getElementById('updateTotalsBtn').addEventListener('click', updateAllTotals);
        document.getElementById('summaryBtn').addEventListener('click', showSummary);
        document.getElementById('copySummaryBtn').addEventListener('click', copySummary);

        setTimeout(showSummary, 200);
    });
})();
</script>
</body>
</html>
